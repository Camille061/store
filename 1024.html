<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สกิน 512</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: #111;
            color: white;
        }

        .top-box{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: #1e1e1e;
            padding: 15px;
        }

        nav{
            background: #2a2a2a;
            padding: 15px;
        }

        nav a{
            text-decoration: none;
            color: antiquewhite;
            margin-left: 10px;
        }

        .products-container{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .box1{
            width: 300px;
            background: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
        }

        .box1 img{
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .btn-inside-box1{
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="top-box">
        <img src="img/logo2.png" alt="" height="60" width="70" style="border-radius: 50%;">
        <h1 style="color: #ff9fea;">Crimson store - 512</h1>
    </div>

    <nav>
        <a href="index.html">ทั้งหมด</a>
        <a href="512.html">สกิน 512</a>
        <a href="1024.html">สกิน 1024</a>
        <a href="addwork.html">ลงงาน</a>
    </nav>

    <div class="products-container" id="productsContainer"></div>

    <script>
        function loadProducts(filterScale = null) {
            const productsContainer = document.getElementById("productsContainer");
            const products = JSON.parse(localStorage.getItem("products")) || [];

            productsContainer.innerHTML = "";

            products.forEach(product => {
                if (filterScale && product.scale !== filterScale) {
                    return;
                }

                const productBox = document.createElement("div");
                productBox.className = "box1";

                productBox.innerHTML = `
                    <img src="${product.image}" alt="product image">
                    <div class="btn-inside-box1">
                        <p><strong>ชื่อ:</strong> ${product.name}</p>
                        <p><strong>ราคา:</strong> ${product.price}</p>
                        <p><strong>สถานะ:</strong> ${product.status}</p>
                        <p><strong>สิทธิ์:</strong> ${product.role}</p>
                        <p><strong>สเกล:</strong> ${product.scale}</p>
                    </div>
                `;

                productsContainer.appendChild(productBox);
            });
        }

        loadProducts("1024");
    </script>
</body>
</html>
